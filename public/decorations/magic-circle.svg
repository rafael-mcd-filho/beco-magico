<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none" stroke="#D79A4E" stroke-width="0.6">
  <!-- círculo externo -->
  <circle cx="200" cy="200" r="180"/>
  <!-- círculo médio -->
  <circle cx="200" cy="200" r="160"/>
  <!-- círculo interno -->
  <circle cx="200" cy="200" r="120"/>
  
  <!-- octógono -->
  <polygon points="200,80 285,115 320,200 285,285 200,320 115,285 80,200 115,115" stroke-width="0.5"/>
  
  <!-- triângulo -->
  <polygon points="200,100 290,250 110,250" stroke-width="0.4"/>
  
  <!-- estrela 8 pontas (raios) -->
  <line x1="200" y1="40" x2="200" y2="80" stroke-width="0.4"/>
  <line x1="200" y1="320" x2="200" y2="360" stroke-width="0.4"/>
  <line x1="40" y1="200" x2="80" y2="200" stroke-width="0.4"/>
  <line x1="320" y1="200" x2="360" y2="200" stroke-width="0.4"/>
  <line x1="87" y1="87" x2="115" y2="115" stroke-width="0.4"/>
  <line x1="285" y1="285" x2="313" y2="313" stroke-width="0.4"/>
  <line x1="313" y1="87" x2="285" y2="115" stroke-width="0.4"/>
  <line x1="115" y1="285" x2="87" y2="313" stroke-width="0.4"/>
  
  <!-- runas/símbolos pequenos espalhados -->
  <circle cx="200" cy="200" r="3" fill="#D79A4E"/>
  <circle cx="200" cy="60" r="2" fill="#D79A4E"/>
  <circle cx="200" cy="340" r="2" fill="#D79A4E"/>
  <circle cx="60" cy="200" r="2" fill="#D79A4E"/>
  <circle cx="340" cy="200" r="2" fill="#D79A4E"/>
</svg>