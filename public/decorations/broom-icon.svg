<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none" stroke="#D79A4E" stroke-width="1.2">
  <!-- cabo da vassoura -->
  <line x1="20" y1="20" x2="75" y2="75" stroke-linecap="round"/>
  
  <!-- amarração da vassoura -->
  <ellipse cx="76" cy="76" rx="6" ry="3" transform="rotate(45 76 76)"/>
  
  <!-- palhas da vassoura (várias linhas em leque) -->
  <line x1="78" y1="78" x2="95" y2="88" stroke-linecap="round"/>
  <line x1="80" y1="80" x2="100" y2="90" stroke-linecap="round"/>
  <line x1="82" y1="82" x2="105" y2="92" stroke-linecap="round"/>
  <line x1="80" y1="82" x2="95" y2="100" stroke-linecap="round"/>
  <line x1="82" y1="80" x2="100" y2="98" stroke-linecap="round"/>
  <line x1="84" y1="82" x2="105" y2="100" stroke-linecap="round"/>
  <line x1="82" y1="84" x2="95" y2="105" stroke-linecap="round"/>
  
  <!-- detalhe na ponta do cabo -->
  <circle cx="20" cy="20" r="2" fill="#D79A4E"/>
</svg>